<h2>Confirmar Eliminación de Documento de Pago</h2>
<p>
  ¿Estás seguro de que quieres eliminar el documento de pago "{{ object.name}}"?
</p>
<form method="post" action="{% url 'payment_document_delete' object.pk %}">
  {% csrf_token %}
  <button type="submit" class="btn-primary">Confirmar Eliminación</button>
  <a href="#" class="btn-cancel">Cancelar</a>
</form>
